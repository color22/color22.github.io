<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吐槽留言墙 - 数据存储在JSON中</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(106, 17, 203, 0.2);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        h1 i {
            font-size: 2.2rem;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .post-section {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .post-section h2 {
            color: #444;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #6a11cb;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
        }
        
        textarea.form-control {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        .btn {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 15px rgba(106, 17, 203, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-export {
            background: linear-gradient(to right, #00b09b, #96c93d);
        }
        
        .btn-export:hover {
            box-shadow: 0 7px 15px rgba(0, 176, 155, 0.3);
        }
        
        .wall-section {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .wall-section h2 {
            color: #444;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .wall-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
        }
        
        .filter-btn {
            background-color: #f0f2f5;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .filter-btn.active {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
        
        .filter-btn:hover:not(.active) {
            background-color: #e4e6e9;
        }
        
        .wall-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .message-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #6a11cb;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .author {
            font-weight: 600;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .time {
            font-size: 0.85rem;
            color: #888;
        }
        
        .message-content {
            flex-grow: 1;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .message-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
        
        .like-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        
        .like-btn:hover {
            color: #ff4757;
        }
        
        .like-btn.liked {
            color: #ff4757;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .delete-btn:hover {
            color: #ff4757;
        }
        
        .empty-wall {
            text-align: center;
            padding: 40px 20px;
            color: #888;
            grid-column: 1 / -1;
        }
        
        .empty-wall i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #ddd;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .counter {
            background-color: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            color: #6a11cb;
        }
        
        .json-display {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.4;
            border: 1px solid #e1e5eb;
        }
        
        .json-display h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .json-key {
            color: #d73a49;
        }
        
        .json-string {
            color: #032f62;
        }
        
        .json-number {
            color: #005cc5;
        }
        
        .json-boolean {
            color: #6f42c1;
        }
        
        .json-null {
            color: #6a737d;
        }
        
        @media (max-width: 768px) {
            .wall-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .wall-controls {
                flex-direction: column;
            }
            
            .filter-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-comment-dots"></i> 吐槽留言墙 - JSON数据版</h1>
            <p class="subtitle">数据存储在JavaScript JSON对象中，刷新页面会重置</p>
        </header>
        
        <section class="post-section">
            <h2><i class="fas fa-edit"></i> 我要吐槽</h2>
            <form id="messageForm">
                <div class="form-group">
                    <label for="author"><i class="fas fa-user"></i> 你的昵称（可选）</label>
                    <input type="text" id="author" class="form-control" placeholder="匿名用户" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="content"><i class="fas fa-comment"></i> 吐槽内容 *</label>
                    <textarea id="content" class="form-control" placeholder="今天有什么想吐槽的？尽情说出来吧！" required maxlength="300"></textarea>
                    <div style="text-align: right; margin-top: 5px; font-size: 0.9rem; color: #888;">
                        <span id="charCount">0</span>/300
                    </div>
                </div>
                <button type="submit" class="btn">
                    <i class="fas fa-paper-plane"></i> 发布吐槽
                </button>
                <button type="button" class="btn btn-export" id="exportJson">
                    <i class="fas fa-code"></i> 查看JSON数据
                </button>
            </form>
        </section>
        
        <section class="wall-section">
            <div class="wall-controls">
                <h2><i class="fas fa-th-large"></i> 吐槽墙 <span class="counter" id="messageCount">0</span></h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="recent">最近</button>
                    <button class="filter-btn" data-filter="popular">最热</button>
                </div>
            </div>
            
            <div class="wall-container" id="wallContainer">
                <!-- 留言将通过JS动态加载 -->
                <div class="empty-wall" id="emptyWall">
                    <i class="fas fa-inbox"></i>
                    <h3>还没有吐槽内容</h3>
                    <p>快来发布第一条吐槽吧！</p>
                </div>
            </div>
        </section>
        
        <section id="jsonSection" style="display: none;">
            <div class="json-display">
                <h3><i class="fas fa-database"></i> 当前JSON数据</h3>
                <pre id="jsonOutput"></pre>
            </div>
        </section>
        
        <footer>
            <p>吐槽留言墙 &copy; 2026 | 数据存储在JavaScript JSON对象中，刷新页面会重置</p>
            <p><small>提示：此版本数据存储在内存中，刷新页面会丢失数据</small></p>
        </footer>
    </div>

    <script>
        // 数据存储在JavaScript JSON对象中
        let messages = [
            {
                id: 1,
                author: "加班狗",
                content: "又又又又又加班了！连续三周996，感觉身体被掏空。说好的项目上线就调休，结果新项目又来了...",
                timestamp: "2026-03-26 22:15:30",
                likes: 12,
                liked: false
            },
            {
                id: 2,
                author: "地铁乘客",
                content: "早高峰的地铁，我挤成了照片！前面大哥的背包顶着我，后面阿姨的菜篮子硌着我，我太难了！",
                timestamp: "2026-03-26 20:45:12",
                likes: 8,
                liked: false
            },
            {
                id: 3,
                author: "程序员小王",
                content: "产品经理第8次改需求了！这次的理由是'我觉得这个颜色不够高级'，我哭了，这已经是第5个版本了！",
                timestamp: "2026-03-26 18:30:45",
                likes: 15,
                liked: false
            },
            {
                id: 4,
                author: "奶茶爱好者",
                content: "奶茶又涨价了！从15涨到18，现在还要20！我的钱包在哭泣，但我的手还是不听使唤地点了下单...",
                timestamp: "2026-03-26 16:20:10",
                likes: 6,
                liked: false
            },
            {
                id: 5,
                author: "起床困难户",
                content: "每天早上闹钟响的时候，我都觉得我和床之间有一种难以割舍的羁绊。为什么世界上要有早上？",
                timestamp: "2026-03-26 08:05:22",
                likes: 9,
                liked: false
            }
        ];
        
        // 用于生成新消息ID
        let nextId = 6;
        
        // DOM元素
        const messageForm = document.getElementById('messageForm');
        const wallContainer = document.getElementById('wallContainer');
        const emptyWall = document.getElementById('emptyWall');
        const messageCount = document.getElementById('messageCount');
        const charCount = document.getElementById('charCount');
        const contentInput = document.getElementById('content');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const exportJsonBtn = document.getElementById('exportJson');
        const jsonSection = document.getElementById('jsonSection');
        const jsonOutput = document.getElementById('jsonOutput');
        
        // 字符计数
        contentInput.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });
        
        // 表单提交事件
        messageForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const author = document.getElementById('author').value.trim() || '匿名用户';
            const content = document.getElementById('content').value.trim();
            
            if (!content) {
                alert('请输入吐槽内容！');
                return;
            }
            
            // 创建新消息对象
            const newMessage = {
                id: nextId++,
                author: author,
                content: content,
                timestamp: new Date().toLocaleString('zh-CN'),
                likes: 0,
                liked: false
            };
            
            // 添加到消息数组
            messages.unshift(newMessage);
            
            // 更新UI
            renderMessages();
            
            // 重置表单
            messageForm.reset();
            charCount.textContent = '0';
            
            // 显示成功反馈
            showSuccessFeedback();
        });
        
        // 显示JSON数据
        exportJsonBtn.addEventListener('click', function() {
            // 格式化JSON显示
            const formattedJson = JSON.stringify(messages, null, 2);
            jsonOutput.innerHTML = syntaxHighlight(formattedJson);
            
            // 切换显示/隐藏
            if (jsonSection.style.display === 'none') {
                jsonSection.style.display = 'block';
                exportJsonBtn.innerHTML = '<i class="fas fa-eye-slash"></i> 隐藏JSON数据';
            } else {
                jsonSection.style.display = 'none';
                exportJsonBtn.innerHTML = '<i class="fas fa-code"></i> 查看JSON数据';
            }
        });
        
        // JSON语法高亮
        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, null, 2);
            }
            
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }
        
        // 显示成功反馈
        function showSuccessFeedback() {
            const submitBtn = messageForm.querySelector('.btn');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fas fa-check"></i> 吐槽成功！';
            submitBtn.style.background = 'linear-gradient(to right, #00b09b, #96c93d)';
            
            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.style.background = 'linear-gradient(to right, #6a11cb, #2575fc)';
            }, 1500);
        }
        
        // 渲染消息
        function renderMessages(filter = 'all') {
            // 过滤消息
            let filteredMessages = [...messages];
            
            if (filter === 'recent') {
                // 最近24小时内的消息
                const oneDayAgo = new Date();
                oneDayAgo.setDate(oneDayAgo.getDate() - 1);
                
                filteredMessages = filteredMessages.filter(msg => {
                    const msgDate = new Date(msg.timestamp);
                    return msgDate > oneDayAgo;
                });
            } else if (filter === 'popular') {
                // 按点赞数排序
                filteredMessages = filteredMessages.sort((a, b) => b.likes - a.likes);
            }
            
            // 更新消息计数
            messageCount.textContent = filteredMessages.length;
            
            // 如果没有消息，显示空状态
            if (filteredMessages.length === 0) {
                emptyWall.style.display = 'block';
                wallContainer.innerHTML = '';
                wallContainer.appendChild(emptyWall);
                return;
            }
            
            // 隐藏空状态
            emptyWall.style.display = 'none';
            
            // 清空容器
            wallContainer.innerHTML = '';
            
            // 创建消息卡片
            filteredMessages.forEach(message => {
                const messageCard = document.createElement('div');
                messageCard.className = 'message-card';
                messageCard.innerHTML = `
                    <div class="message-header">
                        <div class="author">
                            <i class="fas fa-user-circle"></i> ${escapeHtml(message.author)}
                        </div>
                        <div class="time">${message.timestamp}</div>
                    </div>
                    <div class="message-content">${escapeHtml(message.content)}</div>
                    <div class="message-footer">
                        <button class="like-btn ${message.liked ? 'liked' : ''}" data-id="${message.id}">
                            <i class="fas fa-heart"></i>
                            <span class="like-count">${message.likes}</span> 点赞
                        </button>
                        <button class="delete-btn" data-id="${message.id}">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                `;
                
                wallContainer.appendChild(messageCard);
            });
            
            // 添加点赞事件监听器
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    likeMessage(id);
                });
            });
            
            // 添加删除事件监听器
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.getAttribute('data-id'));
                    if (confirm('确定要删除这条吐槽吗？')) {
                        deleteMessage(id);
                    }
                });
            });
        }
        
        // 点赞消息
        function likeMessage(id) {
            const messageIndex = messages.findIndex(msg => msg.id === id);
            
            if (messageIndex !== -1) {
                if (messages[messageIndex].liked) {
                    // 取消点赞
                    messages[messageIndex].likes--;
                    messages[messageIndex].liked = false;
                } else {
                    // 点赞
                    messages[messageIndex].likes++;
                    messages[messageIndex].liked = true;
                }
                
                renderMessages(getActiveFilter());
            }
        }
        
        // 删除消息
        function deleteMessage(id) {
            messages = messages.filter(msg => msg.id !== id);
            renderMessages(getActiveFilter());
        }
        
        // 获取当前活动的过滤器
        function getActiveFilter() {
            const activeFilter = document.querySelector('.filter-btn.active');
            return activeFilter ? activeFilter.getAttribute('data-filter') : 'all';
        }
        
        // 转义HTML特殊字符
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 初始化过滤器按钮
        filterButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有按钮的active类
                filterButtons.forEach(b => b.classList.remove('active'));
                // 为当前按钮添加active类
                this.classList.add('active');
                // 重新渲染消息
                renderMessages(this.getAttribute('data-filter'));
            });
        });
        
        // 初始化应用
        function initApp() {
            renderMessages();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
