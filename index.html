<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Flip Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .card {
            width: 200px;
            height: 300px;
            perspective: 1000px;
            position: relative;
        }
        .card-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
        }
        .card-front {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .card-back {
            background-color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transform: rotateY(180deg);
        }
        #wheel {
            width: 100px;
            height: 100px;
            border: 10px solid #007bff;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 10%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: white;
        }
        #flip-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="flip-btn">🔄 Flip</div>
    <div class="card" id="card">
        <div class="card-inner">
            <div class="card-front">
                Food Selection
            </div>
            <div class="card-back">
                Drink Selection
            </div>
        </div>
    </div>
    <div id="wheel">Wheel</div>
    <script>
        const card = document.getElementById('card');
        const wheel = document.getElementById('wheel');
        const flipBtn = document.getElementById('flip-btn');
        let isFlipped = false;

        flipBtn.addEventListener('click', () => {
            isFlipped = !isFlipped;
            card.classList.toggle('flipped', isFlipped);
            updateWheel();
        });

        function updateWheel() {
            if (isFlipped) {
                wheel.textContent = 'Drink'; // display drink data
            } else {
                wheel.textContent = 'Food'; // display food data
            }
        }
    </script>
</body>
</html>
